<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SecurityChecker</title>
<style>
  :root{
    --bg:#0d1117; --panel:#161b22; --border:#30363d; --fg:#e6edf3; --muted:#8b949e;
    --accent:#58a6ff; --green:#3fb950; --red:#f85149; --yellow:#d29922; --cyan:#39c5cf;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;background:var(--bg);color:var(--fg)}
  header{padding:20px 24px;border-bottom:1px solid var(--border)}
  h1{margin:0;font-size:18px}
  h1 span{color:var(--accent)}
  .sub{color:var(--muted);font-size:12px;margin-top:4px}
  main{max-width:1100px;margin:0 auto;padding:24px}
  .panel{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:16px;margin-bottom:20px}
  textarea{width:100%;min-height:130px;background:var(--bg);color:var(--fg);border:1px solid var(--border);
    border-radius:6px;padding:10px;font:13px ui-monospace,monospace;resize:vertical}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px}
  button{background:var(--accent);color:#06101f;border:0;border-radius:6px;padding:9px 18px;font-weight:600;cursor:pointer;font-family:inherit}
  button:hover{filter:brightness(1.1)}
  button.ghost{background:transparent;color:var(--fg);border:1px solid var(--border)}
  button:disabled{opacity:.5;cursor:not-allowed}
  label.file{border:1px dashed var(--border);border-radius:6px;padding:8px 14px;color:var(--muted);cursor:pointer}
  label.file:hover{border-color:var(--accent);color:var(--fg)}
  input[type=file]{display:none}
  .chk{color:var(--muted);display:flex;align-items:center;gap:6px}
  .spacer{flex:1}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid var(--border);vertical-align:top}
  th{color:var(--muted);font-weight:600;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
  tr.target-row{cursor:pointer}
  tr.target-row:hover{background:#1c2230}
  td.host{color:var(--fg);font-weight:600}
  .pill{display:inline-block;padding:1px 8px;border-radius:10px;font-size:11px;font-weight:600}
  .ok{color:var(--green)} .bad{color:var(--red)} .warn{color:var(--yellow)} .muted{color:var(--muted)} .cyan{color:var(--cyan)}
  .detail td{background:#0f141b;color:var(--muted);white-space:pre-wrap;font-size:12px;padding:12px 16px}
  .detail b{color:var(--fg)}
  .status{color:var(--muted);font-size:12px;min-height:18px}
  a{color:var(--accent)}
  .disclaimer{color:var(--muted);font-size:11px;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>Security<span>Checker</span></h1>
  <div class="sub">robots.txt · security.txt (RFC 9116) · /.well-known/ — passive recon for authorized targets only</div>
</header>
<main>
  <div class="panel">
    <textarea id="input" placeholder="Paste targets — one per line, or comma/space separated&#10;example.com&#10;https://github.com&#10;hackerone.com"></textarea>
    <div class="row">
      <button id="scan">Scan</button>
      <label class="file">Upload .txt / .csv<input id="file" type="file" accept=".txt,.csv"></label>
      <label class="chk"><input id="wk" type="checkbox" checked> probe /.well-known/</label>
      <div class="spacer"></div>
      <button class="ghost" id="copy" disabled>Copy JSON</button>
      <button class="ghost" id="csv" disabled>Download CSV</button>
    </div>
    <div class="status" id="status"></div>
    <div class="disclaimer">Only run this against systems you are authorized to test. Every request is a plain GET of a public, standardized file.</div>
  </div>

  <div class="panel" id="resultsPanel" style="display:none">
    <table id="results">
      <thead><tr>
        <th>Target</th><th>robots</th><th>sec.txt</th><th>expires</th><th>contact</th><th>.well-known</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<script>
const $ = s => document.querySelector(s);
let lastResults = [];

$('#file').addEventListener('change', async e => {
  const f = e.target.files[0];
  if (!f) return;
  const text = await f.text();
  const ta = $('#input');
  ta.value = (ta.value.trim() ? ta.value.trim() + "\n" : "") + text.trim();
  $('#status').textContent = `Loaded ${f.name}`;
});

$('#scan').addEventListener('click', run);
$('#input').addEventListener('keydown', e => { if (e.ctrlKey && e.key === 'Enter') run(); });

async function run(){
  const input = $('#input').value.trim();
  if (!input){ $('#status').textContent = 'Enter at least one target.'; return; }
  const btn = $('#scan');
  btn.disabled = true; btn.textContent = 'Scanning…';
  $('#status').textContent = 'Running…';
  try{
    const res = await fetch('/api/scan', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ input, wellknown: $('#wk').checked })
    });
    if(!res.ok) throw new Error(await res.text());
    const data = await res.json();
    lastResults = data.results || [];
    render(lastResults);
    $('#status').textContent = `Scanned ${data.count} target(s)` + (data.truncated ? ` (truncated to 200)` : '');
    $('#copy').disabled = $('#csv').disabled = lastResults.length === 0;
  }catch(err){
    $('#status').textContent = 'Error: ' + err.message;
  }finally{
    btn.disabled = false; btn.textContent = 'Scan';
  }
}

function esc(s){ return String(s??'').replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c])); }
function host(r){ return (r.base_url||r.target||'').replace(/^https?:\/\//,''); }

function render(results){
  $('#resultsPanel').style.display = results.length ? 'block' : 'none';
  const tb = $('#tbody'); tb.innerHTML = '';
  results.forEach((r, i) => {
    const tr = document.createElement('tr');
    tr.className = 'target-row';
    tr.innerHTML = `
      <td class="host">${esc(host(r))}</td>
      <td>${robotsCell(r)}</td>
      <td>${secCell(r)}</td>
      <td>${expiresCell(r)}</td>
      <td>${contactCell(r)}</td>
      <td>${wkCell(r)}</td>`;
    const detail = document.createElement('tr');
    detail.className = 'detail'; detail.style.display = 'none';
    detail.innerHTML = `<td colspan="6">${detailHTML(r)}</td>`;
    tr.addEventListener('click', () => {
      detail.style.display = detail.style.display === 'none' ? 'table-row' : 'none';
    });
    tb.appendChild(tr); tb.appendChild(detail);
  });
}

function robotsCell(r){
  if(r.error) return '<span class="bad">error</span>';
  if(r.robots && r.robots.found) return `<span class="ok">yes (${(r.robots.disallow||[]).length})</span>`;
  return '<span class="muted">no</span>';
}
function secCell(r){
  const s = r.security_txt;
  if(!s || !s.found) return '<span class="muted">no</span>';
  return `<span class="ok">yes</span> <span class="muted">(${s.location==='legacy-root'?'root':'wk'})</span>`;
}
function expiresCell(r){
  const s = r.security_txt;
  if(!s || !s.found) return '<span class="muted">—</span>';
  const st = s.expiry_state;
  if(st==='valid') return '<span class="ok">valid</span>';
  if(st==='expired') return '<span class="bad">EXPIRED</span>';
  if(st==='invalid') return '<span class="warn">invalid</span>';
  return '<span class="warn">missing</span>';
}
function contactCell(r){
  const s = r.security_txt;
  if(!s || !s.found) return '<span class="muted">—</span>';
  const list = (s.emails && s.emails.length) ? s.emails : (s.contact||[]);
  if(!list.length) return '<span class="muted">—</span>';
  const extra = list.length>1 ? ` <span class="muted">+${list.length-1}</span>` : '';
  return `<span class="cyan">${esc(list[0])}</span>${extra}`;
}
function wkCell(r){
  const n = (r.well_known||[]).filter(h=>h.found).length;
  return n ? `<span class="ok">${n}</span>` : '<span class="muted">0</span>';
}

function detailHTML(r){
  if(r.error) return `<span class="bad">✗ ${esc(r.error)}</span>`;
  let out = '';
  const rb = r.robots;
  if(rb && rb.found && ((rb.disallow||[]).length || (rb.sitemaps||[]).length)){
    out += `<b>robots.txt</b>  (${(rb.disallow||[]).length} disallow, ${(rb.sitemaps||[]).length} sitemaps)\n`;
    (rb.disallow||[]).slice(0,25).forEach(d => out += `  Disallow: ${esc(d)}\n`);
    if((rb.disallow||[]).length>25) out += `  … ${rb.disallow.length-25} more\n`;
    (rb.sitemaps||[]).forEach(s => out += `  Sitemap: ${esc(s)}\n`);
    out += '\n';
  }
  const s = r.security_txt;
  if(s && s.found){
    out += `<b>security.txt</b>  ${esc(s.url)}${s.signed?'  [PGP-signed]':''}\n`;
    const f = (k,v) => (v&&v.length) ? v.forEach(x => out += `  ${k}: ${esc(x)}\n`) : null;
    f('Contact', s.contact);
    if(s.expires) out += `  Expires: ${esc(s.expires)} (${esc(s.expiry_state)})\n`;
    f('Policy', s.policy); f('Encryption', s.encryption); f('Acknowledgments', s.acknowledgments);
    f('Preferred-Languages', s.preferred_languages); f('Canonical', s.canonical);
    f('Hiring', s.hiring); f('CSAF', s.csaf);
    out += '\n';
  }
  const wk = (r.well_known||[]);
  if(wk.length){
    out += `<b>.well-known</b>\n`;
    wk.forEach(h => out += `  [${h.status}] ${esc(h.path.replace('/.well-known/',''))}${h.content_type?'  '+esc(h.content_type):''}\n`);
  }
  return out.trim() || '<span class="muted">nothing notable</span>';
}

// Exports -------------------------------------------------------------------
$('#copy').addEventListener('click', () => {
  navigator.clipboard.writeText(JSON.stringify(lastResults, null, 2));
  $('#status').textContent = 'JSON copied to clipboard';
});
$('#csv').addEventListener('click', () => {
  const head = ['target','base_url','error','robots_found','robots_disallow_count','sitemaps',
    'securitytxt_found','securitytxt_location','expires','expiry_state','emails','policy','wellknown_hits'];
  const rows = lastResults.map(r => {
    const s = r.security_txt || {};
    return [
      r.target, r.base_url, r.error||'',
      !!(r.robots&&r.robots.found), r.robots?(r.robots.disallow||[]).length:0, (r.robots?.sitemaps||[]).join(' | '),
      !!s.found, s.location||'', s.expires||'', s.expiry_state||'',
      (s.emails||[]).join(' | '), (s.policy||[]).join(' | '),
      (r.well_known||[]).filter(h=>h.found).map(h=>h.path.replace('/.well-known/','')).join(' | ')
    ];
  });
  const csv = [head, ...rows].map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob = new Blob([csv], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download = 'securitychecker.csv'; a.click();
  URL.revokeObjectURL(a.href);
});
</script>
</body>
</html>
